version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: mission-control-postgres-test
    environment:
      POSTGRES_DB: mission_control_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - mission-control-test

  redis-test:
    image: redis:7-alpine
    container_name: mission-control-redis-test
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru --save ""
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - mission-control-test

networks:
  mission-control-test:
    driver: bridge
