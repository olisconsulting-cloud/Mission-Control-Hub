name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx next lint
      - run: npm run build
        env:
          DATABASE_URL: 'postgresql://localhost:5432/test'
          NEXTAUTH_SECRET: 'ci-test-secret'
          PAYLOAD_SECRET: 'ci-test-payload-secret'
